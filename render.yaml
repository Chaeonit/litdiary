services:
  - type: web
    name: litdiary
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: litdiary-db
          property: connectionString

databases:
  - name: litdiary-db
    databaseName: litdiary
    plan: free
