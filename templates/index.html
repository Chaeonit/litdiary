<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LitDiary — AI 언어 학습 일기</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── 헤더 ── -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-text">LitDiary</span>
      </div>
      <p class="logo-sub">AI와 함께하는 언어 학습 일기</p>
    </div>
  </header>

  <main class="main">

    <section>

      <!-- 입력 카드 -->
      <div class="card write-card">
        <div class="card-header">
          <h2>오늘의 일기</h2>
        </div>

        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="english">
            <span class="lang-flag">🇺🇸</span>
            <span class="lang-label">English</span>
            <span class="lang-sub">영어로 쓰기</span>
          </button>
          <button class="lang-btn" data-lang="chinese">
            <span class="lang-flag">🇨🇳</span>
            <span class="lang-label">中文</span>
            <span class="lang-sub">중국어로 쓰기</span>
          </button>
        </div>

        <!-- 모드 선택 -->
        <div class="mode-switcher">
          <button class="mode-btn active" data-mode="free">✍️ 자유 쓰기</button>
          <button class="mode-btn" data-mode="beginner">🌱 주제별 쓰기</button>
          <button class="mode-btn" data-mode="question">💬 오늘의 질문</button>
        </div>

        <!-- 질문 선택 모드 -->
        <div id="question-section" class="hidden">
          <p class="topic-guide">난이도를 선택하세요</p>
          <div class="difficulty-cards">
            <button class="difficulty-card" data-level="easy">
              <span class="diff-icon">🟢</span>
              <span class="diff-label">쉬움</span>
              <span class="diff-question" id="q-easy"></span>
            </button>
            <button class="difficulty-card" data-level="medium">
              <span class="diff-icon">🟡</span>
              <span class="diff-label">중간</span>
              <span class="diff-question" id="q-medium"></span>
            </button>
            <button class="difficulty-card" data-level="hard">
              <span class="diff-icon">🔴</span>
              <span class="diff-label">어려움</span>
              <span class="diff-question" id="q-hard"></span>
            </button>
          </div>
          <div id="selected-question" class="selected-question hidden">
            <span class="sq-icon"></span>
            <p class="sq-text"></p>
          </div>
        </div>

        <!-- 초보 모드: 주제 선택 + 힌트 -->
        <div id="beginner-section" class="hidden">
          <p class="topic-guide">주제를 골라보세요</p>
          <div id="topic-grid" class="topic-grid"></div>
          <div id="hint-section" class="hint-section hidden">
            <p class="hint-label">💡 단어를 클릭하면 입력창에 추가돼요</p>
            <div id="hint-words" class="hint-words"></div>
          </div>
          <p class="sentence-guide">3문장 정도 써보세요 ✨</p>
        </div>

        <textarea
          id="diary-input"
          class="diary-textarea"
          placeholder="오늘 있었던 일을 영어로 자유롭게 써보세요..."
          rows="8"
        ></textarea>

        <div class="char-count"><span id="char-count">0</span>자</div>

        <div class="action-row">
          <button id="analyze-btn" class="btn btn-primary">
            <span class="btn-text">🔍 AI 피드백 받기</span>
            <span class="btn-loading hidden">분석 중...</span>
          </button>
          <div class="expr-btns">
            <button id="natural-btn" class="btn btn-expr">✨ 더 자연스럽게</button>
            <button id="native-btn" class="btn btn-expr">🗣️ 네이티브 표현</button>
          </div>
        </div>

        <!-- 표현 추천 결과 -->
        <div id="expr-result" class="expr-result hidden"></div>
      </div>

      <!-- 피드백 영역 (분석 후 표시) -->
      <div id="feedback-section" class="hidden">

        <!-- 점수 & 레벨 -->
        <div class="card score-card">
          <div class="score-wrap">
            <div class="score-circle">
              <span id="score-value">0</span>
              <small>/ 100</small>
            </div>
            <div class="score-info">
              <span id="level-badge" class="badge">--</span>
              <p id="overall-feedback" class="overall-feedback"></p>
            </div>
          </div>
        </div>

        <!-- 교정 텍스트 -->
        <div class="card">
          <h3 class="section-title">✅ 교정된 문장</h3>
          <div id="corrected-text" class="corrected-text"></div>
        </div>

        <!-- 오류 목록 -->
        <div id="errors-card" class="card hidden">
          <h3 class="section-title">🔴 발견된 오류</h3>
          <ul id="errors-list" class="errors-list"></ul>
        </div>

        <!-- 빈칸 채우기 퀴즈 -->
        <div id="quiz-card" class="card hidden">
          <h3 class="section-title">🧩 빈칸 채우기 퀴즈</h3>
          <p class="section-desc">틀린 부분을 기반으로 만든 연습 문제예요.</p>
          <div id="quiz-list" class="quiz-list"></div>
          <button id="check-quiz-btn" class="btn btn-secondary">정답 확인하기</button>
        </div>

        <!-- 관련 단어 -->
        <div id="vocab-card" class="card hidden">
          <h3 class="section-title">📝 관련 단어 학습</h3>
          <p class="section-desc">오늘 일기와 관련된 단어를 익혀보세요.</p>
          <div id="vocab-list" class="vocab-list"></div>
        </div>

        <!-- 저장 버튼 -->
        <div class="save-wrap">
          <button id="save-btn" class="btn btn-save">💾 일기 저장하기</button>
          <span id="save-msg" class="save-msg hidden">✅ 저장되었습니다!</span>
        </div>

      </div>
    </section>

  </main>

  <script src="/static/script.js"></script>
</body>
</html>
