<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LitDiary — AI 언어 학습 일기</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── 헤더 ── -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">
          <svg width="52" height="48" viewBox="0 0 52 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- Book shadow -->
            <ellipse cx="26" cy="46" rx="18" ry="2.5" fill="rgba(0,0,0,0.15)"/>
            <!-- Left page (back cover spine area) -->
            <path d="M4 6 Q4 4 6 4 L25 4 L25 42 L6 42 Q4 42 4 40 Z" fill="#C4955A" stroke="#8B6030" stroke-width="1"/>
            <!-- Right page (front) -->
            <path d="M27 4 L46 4 Q48 4 48 6 L48 40 Q48 42 46 42 L27 42 Z" fill="#FBF6EC" stroke="#C9A87A" stroke-width="1"/>
            <!-- Left page (inner) -->
            <path d="M6 4 L25 4 L25 42 L6 42 Q4 42 4 40 L4 6 Q4 4 6 4Z" fill="#F5EDD8" stroke="none"/>
            <!-- Spine / center binding -->
            <rect x="24" y="3" width="4" height="41" rx="1" fill="#8B6030"/>
            <line x1="26" y1="3" x2="26" y2="44" stroke="#6B4820" stroke-width="0.8"/>
            <!-- Book top/bottom edge lines -->
            <line x1="4" y1="4" x2="48" y2="4" stroke="#8B6030" stroke-width="1.2"/>
            <line x1="4" y1="42" x2="48" y2="42" stroke="#8B6030" stroke-width="1.2"/>

            <!-- Left page ruled lines -->
            <line x1="7" y1="12" x2="23" y2="12" stroke="#C9A87A" stroke-width="0.6" opacity="0.6"/>
            <line x1="7" y1="16" x2="23" y2="16" stroke="#C9A87A" stroke-width="0.6" opacity="0.6"/>
            <line x1="7" y1="20" x2="23" y2="20" stroke="#C9A87A" stroke-width="0.6" opacity="0.6"/>
            <line x1="7" y1="24" x2="23" y2="24" stroke="#C9A87A" stroke-width="0.6" opacity="0.6"/>
            <line x1="7" y1="28" x2="23" y2="28" stroke="#C9A87A" stroke-width="0.6" opacity="0.6"/>
            <line x1="7" y1="32" x2="23" y2="32" stroke="#C9A87A" stroke-width="0.6" opacity="0.6"/>

            <!-- Right page ruled lines -->
            <line x1="29" y1="12" x2="45" y2="12" stroke="#C9A87A" stroke-width="0.6" opacity="0.5"/>
            <line x1="29" y1="16" x2="45" y2="16" stroke="#C9A87A" stroke-width="0.6" opacity="0.5"/>
            <line x1="29" y1="20" x2="45" y2="20" stroke="#C9A87A" stroke-width="0.6" opacity="0.5"/>
            <line x1="29" y1="24" x2="45" y2="24" stroke="#C9A87A" stroke-width="0.6" opacity="0.5"/>
            <line x1="29" y1="28" x2="45" y2="28" stroke="#C9A87A" stroke-width="0.6" opacity="0.5"/>
            <line x1="29" y1="32" x2="45" y2="32" stroke="#C9A87A" stroke-width="0.6" opacity="0.5"/>

            <!-- Left page: Chinese text -->
            <text x="8" y="11" font-size="5.5" fill="#5C2A0E" font-family="serif" font-weight="bold">今天</text>
            <text x="8" y="15.5" font-size="5" fill="#7A6035" font-family="serif">我学习了</text>
            <text x="8" y="19.5" font-size="5" fill="#7A6035" font-family="serif">很多新词</text>
            <text x="8" y="23.5" font-size="4.5" fill="#9B7A50" font-family="serif">汉字 语言</text>
            <text x="8" y="27.5" font-size="4.5" fill="#9B7A50" font-family="serif">学习 日记</text>

            <!-- Right page: English text -->
            <text x="30" y="11" font-size="5" fill="#5C2A0E" font-family="serif" font-style="italic" font-weight="bold">Dear</text>
            <text x="29" y="15.5" font-size="4.5" fill="#7A6035" font-family="serif" font-style="italic">Today I</text>
            <text x="29" y="19.5" font-size="4.5" fill="#7A6035" font-family="serif" font-style="italic">learned so</text>
            <text x="29" y="23.5" font-size="4.5" fill="#9B7A50" font-family="serif" font-style="italic">much about</text>
            <text x="29" y="27.5" font-size="4.5" fill="#9B7A50" font-family="serif" font-style="italic">language...</text>

            <!-- Bookmark ribbon -->
            <polygon points="43,4 46,4 46,16 44.5,14 43,16" fill="#8B2020" opacity="0.85"/>
          </svg>
        </span>
        <span class="logo-text">LitDiary</span>
      </div>
      <p class="logo-sub">AI와 함께하는 언어 학습 일기</p>
    </div>
  </header>

  <!-- ── 탭 ── -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="write">✏️ 일기 쓰기</button>
    <button class="tab-btn" data-tab="history">📚 학습 기록</button>
  </nav>

  <main class="main">

    <!-- ════════════════════════════════════════
         TAB: 일기 쓰기
    ════════════════════════════════════════ -->
    <section id="tab-write" class="tab-content active">

      <!-- 입력 카드 -->
      <div class="card write-card">
        <div class="card-header">
          <h2>오늘의 일기</h2>
          <div class="lang-selector">
            <button class="lang-btn active" data-lang="english">🇺🇸 English</button>
            <button class="lang-btn" data-lang="chinese">🇨🇳 中文</button>
          </div>
        </div>

        <textarea
          id="diary-input"
          class="diary-textarea"
          placeholder="오늘 있었던 일을 영어나 중국어로 자유롭게 써보세요..."
          rows="8"
        ></textarea>

        <div class="char-count"><span id="char-count">0</span>자</div>

        <button id="analyze-btn" class="btn btn-primary">
          <span class="btn-text">🔍 AI 피드백 받기</span>
          <span class="btn-loading hidden">분석 중...</span>
        </button>
      </div>

      <!-- 피드백 영역 (분석 후 표시) -->
      <div id="feedback-section" class="hidden">

        <!-- 점수 & 레벨 -->
        <div class="card score-card">
          <div class="score-wrap">
            <div class="score-circle">
              <span id="score-value">0</span>
              <small>/ 100</small>
            </div>
            <div class="score-info">
              <span id="level-badge" class="badge">--</span>
              <p id="overall-feedback" class="overall-feedback"></p>
            </div>
          </div>
        </div>

        <!-- 교정 텍스트 -->
        <div class="card">
          <h3 class="section-title">✅ 교정된 문장</h3>
          <div id="corrected-text" class="corrected-text"></div>
        </div>

        <!-- 오류 목록 -->
        <div id="errors-card" class="card hidden">
          <h3 class="section-title">🔴 발견된 오류</h3>
          <ul id="errors-list" class="errors-list"></ul>
        </div>

        <!-- 빈칸 채우기 퀴즈 -->
        <div id="quiz-card" class="card hidden">
          <h3 class="section-title">🧩 빈칸 채우기 퀴즈</h3>
          <p class="section-desc">틀린 부분을 기반으로 만든 연습 문제예요.</p>
          <div id="quiz-list" class="quiz-list"></div>
          <button id="check-quiz-btn" class="btn btn-secondary">정답 확인하기</button>
        </div>

        <!-- 관련 단어 -->
        <div id="vocab-card" class="card hidden">
          <h3 class="section-title">📝 관련 단어 학습</h3>
          <p class="section-desc">오늘 일기와 관련된 단어를 익혀보세요.</p>
          <div id="vocab-list" class="vocab-list"></div>
        </div>

        <!-- 저장 버튼 -->
        <div class="save-wrap">
          <button id="save-btn" class="btn btn-save">💾 일기 저장하기</button>
          <span id="save-msg" class="save-msg hidden">✅ 저장되었습니다!</span>
        </div>

      </div>
    </section>

    <!-- ════════════════════════════════════════
         TAB: 학습 기록
    ════════════════════════════════════════ -->
    <section id="tab-history" class="tab-content hidden">
      <div class="card">
        <h2 class="section-title">📚 나의 학습 기록</h2>
        <div id="history-list" class="history-list">
          <p class="empty-msg">저장된 일기가 없습니다.</p>
        </div>
      </div>
    </section>

  </main>

  <script src="/static/script.js"></script>
</body>
</html>
